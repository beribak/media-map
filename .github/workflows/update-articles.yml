name: Update time.mk articles

on:
  # Scheduled runs are intentionally paused for now.
  # To re-enable the hourly sync later, uncomment the lines below:
  # schedule:
  #   - cron: '7 * * * *'
  # Manual runs stay enabled through the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-articles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Fetch latest time.mk articles
        run: npm run fetch:articles

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/articles.yml _articles _data/sources.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "auto: refresh time.mk articles"
          git push
